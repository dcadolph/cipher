name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          check-latest: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.6.0

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          check-latest: true
      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.26.x"
          check-latest: true
        continue-on-error: true

  gofmt-goimports:
    name: gofmt and goimports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          check-latest: true
      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest
      - name: gofmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "These files are not gofmt'd:"
            gofmt -l .
            gofmt -d .
            exit 1
          fi
      - name: goimports
        run: |
          if [ -n "$(goimports -l .)" ]; then
            echo "These files need goimports:"
            goimports -l .
            goimports -d .
            exit 1
          fi
