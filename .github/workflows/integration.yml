name: integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  vault:
    name: vault
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true

      - name: Start vault
        run: |
          docker run -d --name vault \
            -p 8200:8200 \
            --cap-add=IPC_LOCK \
            -e VAULT_DEV_ROOT_TOKEN_ID=root-token \
            hashicorp/vault:latest \
            server -dev -dev-listen-address=0.0.0.0:8200

      - name: Run vault integration tests
        env:
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: root-token
        run: go test -tags integration -v ./vault/...

      - name: Stop vault
        if: always()
        run: docker stop vault || true
