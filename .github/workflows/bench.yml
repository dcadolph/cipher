name: bench

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"

permissions:
  contents: read

jobs:
  bench:
    name: go test -bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true
      - name: Run benchmarks
        run: |
          go test -run=^$ -bench=. -benchmem -benchtime=2s ./... \
            | tee bench.out
      - name: Upload benchmark output
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ github.sha }}
          path: bench.out
          retention-days: 30
